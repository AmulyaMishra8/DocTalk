services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: neuralhire
      POSTGRES_PASSWORD: neuralhire
      POSTGRES_DB: neuralhire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
